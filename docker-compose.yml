services:
  relay:
    image: ghcr.io/docmgnt/docmgmt-print-relay:latest
    restart: unless-stopped
    env_file: .env
    networks:
      - internal
    # IMPORTANT: do not publish a `ports:` mapping here. The relay's only
    # production defenses are the cloudflared tunnel + the API_KEY bearer
    # check. Publishing the port exposes the relay directly to the LAN
    # without those protections. Cloudflared reaches the relay via Docker's
    # internal network on the hostname `relay`.

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - relay
    networks:
      - internal

networks:
  internal:
